<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactoryFlow AI — Production Scheduling</title>
  <meta name="description" content="AI-powered production scheduling. Upload your orders CSV and get an optimized Gantt schedule instantly." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F4F5F7; --surface: #FFFFFF; --s2: #F8F9FA; --s3: #F0F1F3;
      --b: #E2E5EA; --b2: #CDD1D8; --b3: #B5BAC4;
      --ac: #0052CC; --al: #E6EEFF; --am: #B3CCFF; --ad: #003D99; --ah: #F0F4FF;
      --tx: #172B4D; --tm: #42526E; --td: #6B778C; --tx2: #97A0AF;
      --gr: #006644; --gb: #E3FCEF; --gm: #ABF5D1;
      --re: #BF2600; --rb: #FFEBE6; --rm: #FFBDAD;
      --am2: #FF8B00; --ab2: #FFFAE6;
      --pu: #403294; --pb: #EAE6FF;
      --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'IBM Plex Sans', sans-serif; color: var(--tx); font-size: 14px; line-height: 1.5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--s3); }
    ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 99px; }

    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes msgIn   { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes barGrow { from { width: 0; } to { width: var(--tw, 100%); } }
    @keyframes thinking { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

    .fi  { animation: fadeIn .3s cubic-bezier(.22,1,.36,1) both; }
    .mi  { animation: msgIn .28s cubic-bezier(.22,1,.36,1) both; }

    /* ── Layout ─────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--b); display: flex; flex-direction: column; overflow: hidden; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }

    /* ── Sidebar ────────────────────────────── */
    .logo-area { padding: 18px 16px 14px; border-bottom: 1px solid var(--b); display: flex; align-items: center; gap: 10px; }
    .logo-icon  { width: 36px; height: 36px; border-radius: 9px; background: var(--ac); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 700; flex-shrink: 0; }
    .logo-name  { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
    .logo-sub   { font-size: 9px; color: var(--ac); font-weight: 700; letter-spacing: .1em; margin-top: 1px; }
    .sidebar-section { padding: 12px 14px 4px; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--tx2); }
    .session-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .session-item { padding: 9px 10px; border-radius: var(--r8); cursor: pointer; transition: background .12s; margin-bottom: 2px; border: 1px solid transparent; }
    .session-item:hover  { background: var(--s2); }
    .session-item.active { background: var(--al); border-color: var(--am); }
    .session-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-meta  { font-size: 11px; color: var(--td); margin-top: 2px; }
    .new-btn { margin: 10px; padding: 10px; border-radius: var(--r8); border: 1.5px dashed var(--b2); background: none; cursor: pointer; font-family: inherit; font-size: 13px; color: var(--td); transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; width: calc(100% - 20px); }
    .new-btn:hover { border-color: var(--ac); color: var(--ac); background: var(--ah); }

    /* ── Header ─────────────────────────────── */
    #header { background: var(--surface); border-bottom: 1px solid var(--b); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .breadcrumb { font-size: 13px; color: var(--td); display: flex; align-items: center; gap: 6px; }
    .breadcrumb span { color: var(--tx); font-weight: 500; }

    /* ── Chat ───────────────────────────────── */
    #chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .msg       { display: flex; gap: 10px; }
    .msg.user  { flex-direction: row-reverse; }
    .avatar    { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .av-ai     { background: var(--ac); color: #fff; }
    .av-user   { background: linear-gradient(135deg, #0052CC, #403294); color: #fff; }
    .bubble    { max-width: 72%; padding: 11px 15px; border-radius: var(--r12); font-size: 13px; line-height: 1.6; }
    .bubble.ai   { background: var(--surface); border: 1px solid var(--b); color: var(--tx); border-radius: 4px var(--r12) var(--r12) var(--r12); }
    .bubble.user { background: var(--ac); color: #fff; border-radius: var(--r12) 4px var(--r12) var(--r12); }
    .bubble strong { font-weight: 600; }
    .bubble ul { margin: 6px 0 0 16px; }
    .bubble li { margin-bottom: 3px; }
    .bubble a  { color: var(--ac); cursor: pointer; text-decoration: underline; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--b2); display: inline-block; animation: thinking .9s ease infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }

    /* ── Upload zone ────────────────────────── */
    .upload-zone { border: 2px dashed var(--b2); border-radius: var(--r12); padding: 28px 20px; text-align: center; cursor: pointer; transition: all .18s; background: var(--surface); }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--ac); background: var(--ah); }

    /* ── Result card ────────────────────────── */
    .result-card { background: var(--surface); border: 1px solid var(--b); border-radius: var(--r12); overflow: hidden; width: 100%; max-width: 800px; }
    .result-header { padding: 12px 16px; border-bottom: 1px solid var(--b); background: var(--s2); display: flex; align-items: center; justify-content: space-between; }
    .result-title  { font-size: 13px; font-weight: 600; }

    /* ── Gantt ──────────────────────────────── */
    .gantt-wrap   { overflow-x: auto; }
    .gantt-row    { display: flex; align-items: center; height: 44px; border-bottom: 1px solid var(--b); }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-label  { width: 100px; min-width: 100px; padding: 0 10px 0 0; font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--tm); flex-shrink: 0; }
    .gantt-track  { flex: 1; position: relative; height: 44px; display: flex; align-items: center; }
    .gantt-bar-el { position: absolute; height: 28px; border-radius: 5px; display: flex; align-items: center; padding: 0 7px; font-size: 10px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; overflow: hidden; cursor: default; transition: filter .13s; }
    .gantt-bar-el:hover { filter: brightness(.9); z-index: 5; }
    .gantt-grid   { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--b); opacity: .7; }

    /* ── Stats ──────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
    .stat-box  { background: var(--surface); border: 1px solid var(--b); border-radius: var(--r8); padding: 12px 14px; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--td); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .stat-sub   { font-size: 11px; color: var(--td); margin-top: 2px; }

    /* ── Table ──────────────────────────────── */
    .data-table    { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th { padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--td); background: var(--s2); border-bottom: 1px solid var(--b); }
    .data-table td { padding: 9px 10px; border-bottom: 1px solid var(--b); color: var(--tm); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--s2); }
    .mono { font-family: 'IBM Plex Mono', monospace; font-weight: 500; color: var(--tx); }

    /* ── Chips / badges ─────────────────────── */
    .chip         { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .chip-on-time { background: var(--gb); color: var(--gr); }
    .chip-late    { background: var(--rb); color: var(--re); }
    .badge        { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: .04em; }
    .badge-ai     { background: var(--al); color: var(--ac); }
    .badge-ok     { background: var(--gb); color: var(--gr); }
    .badge-warn   { background: var(--ab2); color: var(--am2); }
    .badge-demo   { background: #EAE6FF; color: #403294; }

    /* ── Bottleneck bars ────────────────────── */
    .bn-row   { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--b); }
    .bn-row:last-child { border-bottom: none; }
    .bn-label { width: 70px; font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--tm); }
    .bn-track { flex: 1; height: 7px; background: var(--s3); border-radius: 99px; overflow: hidden; }
    .bn-fill  { height: 100%; border-radius: 99px; }
    .bn-pct   { font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; width: 36px; text-align: right; }

    /* ── Insights ───────────────────────────── */
    .insight-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--b); }
    .insight-item:last-child { border-bottom: none; }
    .insight-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }

    /* ── Tabs ───────────────────────────────── */
    .tab-row { display: flex; gap: 2px; padding: 0 16px; border-bottom: 1px solid var(--b); background: var(--s2); }
    .tab-btn { padding: 9px 14px; font-size: 12px; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--td); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .14s; font-family: inherit; }
    .tab-btn:hover  { color: var(--tm); }
    .tab-btn.active { color: var(--ac); font-weight: 600; border-bottom-color: var(--ac); }

    /* ── Input bar ──────────────────────────── */
    #input-bar  { background: var(--surface); border-top: 1px solid var(--b); padding: 14px 24px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    #msg-input  { flex: 1; border: 1px solid var(--b2); border-radius: var(--r8); padding: 10px 14px; font-family: inherit; font-size: 13px; color: var(--tx); background: var(--surface); outline: none; resize: none; line-height: 1.5; max-height: 120px; min-height: 42px; transition: border-color .15s, box-shadow .15s; }
    #msg-input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(0,82,204,.1); }
    #msg-input::placeholder { color: var(--tx2); }
    .send-btn   { width: 40px; height: 40px; border-radius: var(--r8); background: var(--ac); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; transition: all .14s; }
    .send-btn:hover    { background: var(--ad); transform: translateY(-1px); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .attach-btn { width: 40px; height: 40px; border-radius: var(--r8); background: var(--s2); border: 1px solid var(--b); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--td); font-size: 16px; flex-shrink: 0; transition: all .14s; }
    .attach-btn:hover { background: var(--al); color: var(--ac); border-color: var(--am); }

    /* ── Empty state ────────────────────────── */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .empty-icon  { font-size: 48px; margin-bottom: 16px; opacity: .65; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--tx); margin-bottom: 6px; }
    .empty-sub   { font-size: 13px; color: var(--td); max-width: 380px; line-height: 1.65; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; justify-content: center; }
    .sugg        { padding: 7px 14px; border-radius: 99px; border: 1px solid var(--b2); background: var(--surface); font-size: 12px; color: var(--tm); cursor: pointer; transition: all .14s; font-family: inherit; }
    .sugg:hover  { border-color: var(--ac); color: var(--ac); background: var(--ah); }

    /* ── API key banner ─────────────────────── */
    #api-banner { background: #FFFAE6; border-bottom: 1px solid #FFD700; padding: 8px 24px; font-size: 12px; color: #7A5800; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #api-banner input { flex: 1; max-width: 360px; border: 1px solid #F0C040; border-radius: 6px; padding: 5px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: #fff; outline: none; }
    #api-banner input:focus { border-color: var(--ac); box-shadow: 0 0 0 2px rgba(0,82,204,.12); }
    .save-key-btn { padding: 5px 12px; border-radius: 6px; background: var(--ac); color: #fff; border: none; font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer; transition: background .14s; }
    .save-key-btn:hover { background: var(--ad); }
    #banner-close { cursor: pointer; font-size: 16px; color: var(--td); margin-left: auto; background: none; border: none; font-family: inherit; }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 700px) {
      #sidebar { display: none; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <div id="sidebar">
    <div class="logo-area">
      <div class="logo-icon">⚙</div>
      <div>
        <div class="logo-name">FactoryFlow AI</div>
        <div class="logo-sub">OPEN · FREE · OPTIMIZED</div>
      </div>
    </div>

    <button class="new-btn" onclick="newSession()">
      <span style="font-size:16px">+</span> New Schedule
    </button>

    <div class="sidebar-section">Sessions</div>
    <div class="session-list" id="session-list"></div>

    <div style="padding:12px;border-top:1px solid var(--b)">
      <div style="font-size:11px;color:var(--td);margin-bottom:8px;font-weight:500">Quick upload</div>
      <input type="file" id="file-sidebar" accept=".csv" style="display:none" onchange="handleFile(this)">
      <button class="attach-btn" style="width:100%;border-radius:var(--r8);height:36px;font-size:12px;color:var(--tm);gap:6px"
        onclick="document.getElementById('file-sidebar').click()">
        📁 Upload Orders CSV
      </button>
      <div style="margin-top:10px;font-size:10px;color:var(--tx2);text-align:center">
        Supported: CSV · Max 10MB<br>
        <a href="sample_orders.csv" download style="color:var(--ac)">Download sample CSV ↓</a>
      </div>
    </div>
  </div>

  <!-- ── Main ────────────────────────────────────────────────── -->
  <div id="main">

    <!-- API Key banner -->
    <div id="api-banner">
      <span>⚡ Enter your <strong>Anthropic API key</strong> for live AI optimization (or use Demo Mode without one):</span>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
      <button class="save-key-btn" onclick="saveKey()">Save</button>
      <button id="banner-close" onclick="closeBanner()">✕</button>
    </div>

    <!-- Header -->
    <div id="header">
      <div class="breadcrumb">
        FactoryFlow AI › <span id="session-title">New Session</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge badge-ai" id="mode-badge">⚡ Demo Mode</span>
        <span class="badge badge-ok" id="status-badge">● Ready</span>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-area"></div>

    <!-- Input -->
    <div id="input-bar">
      <input type="file" id="file-chat" accept=".csv" style="display:none" onchange="handleFile(this)">
      <button class="attach-btn" onclick="document.getElementById('file-chat').click()" title="Upload CSV">📎</button>
      <textarea id="msg-input" placeholder="Upload a CSV, ask about your schedule, or type 'try sample data'…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let sessions = [], currentId = null, busy = false;
let apiKey = localStorage.getItem('ff_api_key') || '';

if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('api-banner').style.display = 'none';
  document.getElementById('mode-badge').textContent = '⚡ Claude AI';
  document.getElementById('mode-badge').className = 'badge badge-ai';
}

function saveKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem('ff_api_key', v);
  document.getElementById('api-banner').style.display = 'none';
  document.getElementById('mode-badge').textContent = '⚡ Claude AI';
  document.getElementById('mode-badge').className = 'badge badge-ai';
  setStatus('● API Key Saved', 'green');
  setTimeout(() => setStatus('● Ready', 'green'), 2000);
}

function closeBanner() {
  document.getElementById('api-banner').style.display = 'none';
}

// ── Sessions ───────────────────────────────────────────────────────────
function mkSession(title) {
  const id = 'ss' + Date.now();
  sessions.unshift({ id, title: title || 'New Session', messages: [], orders: [], schedule: null, ts: new Date() });
  currentId = id;
  renderSidebar();
  return sessions[0];
}

function getSess() { return sessions.find(s => s.id === currentId); }

function newSession() {
  mkSession('New Session');
  renderChat();
  document.getElementById('session-title').textContent = 'New Session';
}

function switchSess(id) {
  currentId = id;
  renderSidebar();
  renderChat();
  document.getElementById('session-title').textContent = getSess().title;
}

function renderSidebar() {
  const el = document.getElementById('session-list');
  if (!sessions.length) {
    el.innerHTML = '<div style="padding:20px 10px;text-align:center;font-size:12px;color:var(--tx2)">No sessions yet</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id===currentId?'active':''}" onclick="switchSess('${s.id}')">
      <div class="session-title">${esc(s.title)}</div>
      <div class="session-meta">${s.orders.length?s.orders.length+' orders':'Empty'} · ${ago(s.ts)}</div>
    </div>`).join('');
}

function ago(d) {
  const ms = Date.now() - new Date(d);
  if (ms < 60000) return 'just now';
  if (ms < 3600000) return Math.floor(ms/60000)+'m ago';
  return Math.floor(ms/3600000)+'h ago';
}

// ── Chat render ────────────────────────────────────────────────────────
function renderChat() {
  const s = getSess(), area = document.getElementById('chat-area');
  if (!s || !s.messages.length) {
    area.innerHTML = `<div class="empty-state fi">
      <div class="empty-icon">🏭</div>
      <div class="empty-title">Welcome to FactoryFlow AI</div>
      <div class="empty-sub">Upload your production orders CSV and I'll generate an optimized schedule — minimizing delays and maximizing throughput.</div>
      <div class="suggestions">
        <button class="sugg" onclick="suggest('Load sample data and optimize it')">Try sample data</button>
        <button class="sugg" onclick="suggest('What CSV format do I need?')">CSV format</button>
        <button class="sugg" onclick="suggest('How does the optimizer work?')">How it works</button>
        <button class="sugg" onclick="document.getElementById('file-chat').click()">Upload CSV →</button>
      </div>
    </div>`;
    return;
  }
  area.innerHTML = s.messages.map((m,i) => renderMsg(m, i)).join('');
  area.scrollTop = area.scrollHeight;
}

function renderMsg(m, i) {
  const delay = `animation-delay:${Math.min(i,8)*25}ms`;
  if (m.type === 'user')
    return `<div class="msg user mi" style="${delay}"><div class="avatar av-user">You</div><div class="bubble user">${esc(m.text)}</div></div>`;
  if (m.type === 'ai')
    return `<div class="msg mi" style="${delay}"><div class="avatar av-ai">AI</div><div class="bubble ai">${m.html||esc(m.text)}</div></div>`;
  if (m.type === 'upload')
    return `<div class="msg user mi" style="${delay}"><div class="avatar av-user">You</div>
      <div class="bubble user"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span>📄</span><strong>${esc(m.filename)}</strong></div>
      <div style="font-size:12px;opacity:.85">${m.rows} orders detected</div></div></div>`;
  if (m.type === 'schedule')
    return `<div class="msg mi" style="${delay}"><div class="avatar av-ai">AI</div><div style="flex:1;max-width:820px">${buildResultCard(m.data)}</div></div>`;
  if (m.type === 'typing')

}

function switchTab(tid, idx, btn) {

}

function buildGantt(schedule) {
  if (!schedule?.length) return '<div style="color:var(--td);font-size:13px;padding:8px">No schedule data</div>';
  const machines = [...new Set(schedule.map(j => j.machine))];
  const allT = schedule.flatMap(j => [j.startSlot, j.endSlot]);
  const minT = Math.min(...allT), maxT = Math.max(...allT);
  const range = maxT - minT || 1;
  const p = v => ((v - minT) / range * 100).toFixed(2);
  const COLS = ['#0052CC','#00875A','#403294','#974F0C','#0747A6','#006644','#7A869A'];
  const mc = {};
  machines.forEach((m,i) => mc[m] = COLS[i % COLS.length]);

  const hours = [];
  for (let h = Math.floor(minT); h <= Math.ceil(maxT); h += 2) hours.push(h);

  const header = `<div style="display:flex;margin-bottom:3px;padding-left:100px">
    ${hours.map(h=>`<div style="flex:none;font-size:9px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;min-width:48px">${h}:00</div>`).join('')}
  </div>`;

  const rows = machines.map(machine => {
    const jobs = schedule.filter(j => j.machine === machine);
    const col = mc[machine];
    return `<div class="gantt-row">
      <div class="gantt-label">${machine}</div>
      <div class="gantt-track">
        ${hours.map((_,i)=>`<div class="gantt-grid" style="left:${(i*2/range*100).toFixed(2)}%"></div>`).join('')}
        ${jobs.map(j => {
          const left = p(j.startSlot);
          const width = Math.max(parseFloat(p(j.endSlot)) - parseFloat(left), 1.5);
          return `<div class="gantt-bar-el" title="${j.orderId} | ${j.jobType} | ${j.duration}h${j.isLate?' ⚠ LATE':''}"
            style="left:${left}%;width:${width}%;background:${j.isLate?'#FFEBE6':col+'1e'};border:1.5px solid ${j.isLate?'#FF5630':col+'66'};color:${j.isLate?'#BF2600':col}">
            ${j.orderId}${j.isLate?' ⚠':''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  return `<div class="gantt-wrap"><div style="min-width:480px">${header}${rows}</div></div>`;
}

function buildJobsTable(schedule) {
  if (!schedule?.length) return '';
  const sorted = [...schedule].sort((a,b) => a.startSlot - b.startSlot);
  return `<div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>Order ID</th><th>Machine</th><th>Job Type</th><th>Start</th><th>End</th><th>Duration</th><th>Status</th></tr></thead>
    <tbody>${sorted.map(j=>`<tr>
      <td><span class="mono">${esc(j.orderId)}</span></td>
      <td><span class="mono">${esc(j.machine)}</span></td>
      <td>${esc(j.jobType)}</td>

function buildBottlenecks(bns) {
  if (!bns?.length) return '<div style="color:var(--td);font-size:13px;padding:8px 0">No bottlenecks — load is balanced.</div>';
  return bns.map(bn => {

function buildInsights(ins) {

// ── File handling ──────────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = e => parseCSV(file.name, e.target.result);
  reader.readAsText(file);
}

function parseCSV(filename, content) {
  const lines = content.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) { aiMsg('<div style="color:var(--re)">⚠ CSV needs a header row and at least one order.</div>'); return; }
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["\s]/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = smartSplit(lines[i]);
    const row = {};
    headers.forEach((h,j) => row[h] = (vals[j]||'').trim().replace(/^"|"$/g,''));
    if (row.order_id||row.orderid||row.id||row['order id']) rows.push(row);
  }
  if (!rows.length) { aiMsg('<div style="color:var(--re)">⚠ No valid orders found. Ensure your CSV has an order_id column.</div>'); return; }

  let sess = getSess();
  if (!sess) sess = mkSession(filename.replace(/\.(csv|xlsx)$/i,''));
  else { sess.title = filename.replace(/\.(csv|xlsx)$/i,''); document.getElementById('session-title').textContent = sess.title; }
  sess.orders = rows;
  renderSidebar();

  addMsg({ type:'upload', filename, rows:rows.length });
  setStatus('● Optimizing…', 'blue');
  runOptimize(rows, filename);
}

function smartSplit(line) {
  const result = []; let cur = '', inQ = false;
  for (const c of line) {
    if (c==='"') { inQ=!inQ; continue; }
    if (c===',' && !inQ) { result.push(cur); cur=''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

// ── Optimization ───────────────────────────────────────────────────────
async function runOptimize(orders, filename) {
  if (busy) return; busy = true;
  document.getElementById('send-btn').disabled = true;
  addMsg({ type:'typing' });

  const prompt = `Optimize this production schedule for ${orders.length} manufacturing orders:\n\n${orders.slice(0,60).map(o=>JSON.stringify(o)).join('\n')}\n\nReturn ONLY valid JSON — no markdown, no extra text.`;

  let result = null;

  if (apiKey) {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: `You are FactoryFlow AI. Respond ONLY with a valid JSON object with this exact shape:
{"schedule":[{"orderId":"","machine":"M-01","jobType":"","startSlot":8.0,"endSlot":10.5,"duration":2.5,"isLate":false,"dueSlot":17.0}],
"bottlenecks":[{"machine":"M-01","util":94,"note":"Critical — add capacity"}],
"insights":[{"type":"critical|warning|success|info","title":"","text":""}],
"stats":{"totalJobs":0,"lateJobs":0,"avgUtil":0,"totalTardiness":0,"solveTime":"1.2s","status":"OPTIMAL"},
"summary":""}
Rules: startSlot/endSlot = hours from midnight (8.0=08:00). No machine overlaps. Shift: 07:00-19:00. Sort by priority. Minimize tardiness.`,
          messages: [{ role:'user', content:prompt }]
        })
      });
      if (res.ok) {
        const d = await res.json();
        const raw = d.content?.[0]?.text || '';
        const cleaned = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
        try { result = JSON.parse(cleaned); }
        catch { const m = cleaned.match(/\{[\s\S]*\}/); if(m) result = JSON.parse(m[0]); }
      }
    } catch(e) { console.error('API error', e); }
  }

  if (!result) result = demoSchedule(orders);

  removeTyping();
  const sess = getSess();
  if (sess) { sess.schedule = result; sess.title = filename.replace(/\.(csv|xlsx)$/i,'') + ' — ' + result.stats.totalJobs + ' orders'; document.getElementById('session-title').textContent = sess.title; renderSidebar(); }

  addMsg({ type:'schedule', data:result });
  aiMsg(`<strong>Schedule complete!</strong> ${esc(result.summary || '')}<br>Explore the tabs above — Gantt chart, job table, bottlenecks, and insights.`);
  setStatus('● Done', 'green');
  if (!apiKey) document.getElementById('mode-badge').textContent = '⚡ Demo Mode';

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

// ── Demo scheduler (no API key) ────────────────────────────────────────
function demoSchedule(orders) {
  const priW = {urgent:0, high:1, medium:2, low:3};
  const sorted = [...orders].sort((a,b) => (priW[a.priority?.toLowerCase()]??2) - (priW[b.priority?.toLowerCase()]??2));
  const machineTypes = ['M-01','M-02','M-03','M-04','M-05'];
  const next = {}; machineTypes.forEach(m => next[m] = 7);

  const schedule = sorted.map((o, i) => {
    const m = machineTypes[i % machineTypes.length];
    const dur = parseFloat(o.cycle_time||o.cycletime||o.duration||1.5)
              + parseFloat(o.setup_time||o.setuptime||0.25);
    const start = Math.round(next[m]*4)/4;
    const end = Math.round((start+dur)*4)/4;
    next[m] = end + 0.25;
    const dueSlot = 17;
    return {
      orderId: o.order_id||o.orderid||o.id||`ORD-${String(i+1).padStart(4,'0')}`,
      machine: m,
      jobType: o.job_type||o.jobtype||o.type||'Processing',
      startSlot: start, endSlot: end,
      duration: Math.round(dur*4)/4,
      isLate: end > dueSlot, dueSlot
    };
  });

  const late = schedule.filter(j=>j.isLate).length;
  const utilMap = {};
  machineTypes.forEach(m => {
    const busy = schedule.filter(j=>j.machine===m).reduce((s,j)=>s+(j.endSlot-j.startSlot),0);
    utilMap[m] = Math.min(Math.round(busy/12*100), 99);
  });
  const bns = Object.entries(utilMap).filter(([,u])=>u>0).sort(([,a],[,b])=>b-a)
    .map(([m,u]) => ({ machine:m, util:u, note:u>=90?'Critical — add parallel capacity':u>=75?'High — monitor closely':u>=50?'Moderate utilization':'Healthy' }));
  const avgUtil = Math.round(Object.values(utilMap).reduce((a,b)=>a+b,0)/machineTypes.length);
  const tard = Math.round(schedule.filter(j=>j.isLate).reduce((s,j)=>s+(j.endSlot-j.dueSlot),0)*10)/10;

  return {
    schedule, bottlenecks: bns.slice(0,5),
    insights: [
      late===0
        ? {type:'success',title:'All jobs on schedule',text:`All ${schedule.length} orders complete before due dates.`}
        : {type:'warning',title:`${late} late order${late>1?'s':''}`,text:`${late} job${late>1?'s are':' is'} late. Total tardiness: ${tard}h.`},
      bns[0]?.util>=80
        ? {type:'critical',title:`${bns[0].machine} bottleneck`,text:`Running at ${bns[0].util}% utilization — primary throughput constraint.`}
        : {type:'success',title:'No critical bottlenecks',text:'All machines within healthy utilization range.'},
      {type:'info',title:`Avg utilization: ${avgUtil}%`,text:avgUtil<55?'Capacity available for additional orders.':avgUtil>85?'Near capacity — plan carefully for new orders.':'Healthy utilization balance.'},
      {type:'info',title:'Priority dispatch applied',text:`${schedule.length} orders scheduled. Urgent and high-priority jobs front-loaded.`},
    ],
    stats: { totalJobs:schedule.length, lateJobs:late, avgUtil, totalTardiness:tard, solveTime:'< 1s (demo)', status:late===0?'OPTIMAL':'FEASIBLE' },
    summary: `Scheduled ${schedule.length} orders across ${machineTypes.length} machines. ${late===0?'All jobs on time.':late+' jobs late.'}`
  };
}
